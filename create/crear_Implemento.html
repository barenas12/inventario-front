<script>
    // ✅ Verificación manual de sesión al cargar
    document.addEventListener('DOMContentLoaded', () => {
        const token = sessionStorage.getItem('token');

        if (!token) {
            window.location.href = '../login.html';
            return;
        }

        // Verificar si el token está expirado manualmente
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const ahora = Math.floor(Date.now() / 1000);
            if (ahora > payload.exp) {
                sessionStorage.clear();
                alert('Tu sesión ha expirado. Por favor inicia sesión nuevamente.');
                window.location.href = '../login.html';
                return;
            }
        } catch (e) {
            sessionStorage.clear();
            window.location.href = '../login.html';
            return;
        }

        // ✅ Solo si el token es válido, iniciar verificación periódica
        if (typeof iniciarVerificacionToken === 'function') {
            iniciarVerificacionToken();
        }
        if (typeof validarPermisosUsuario === 'function') {
            validarPermisosUsuario();
        }
    });
    // ✅ FUNCIÓN PARA HACER REQUESTS CON JWT
    async function fetchConToken(url, opciones = {}) {
        const token = sessionStorage.getItem('token');

        if (!token) {
            console.log('❌ No hay token, redirigiendo a login');
            window.location.href = 'login.html';
            return;
        }

        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...opciones.headers
        };

        try {
            const response = await fetch(url, {
                ...opciones,
                headers
            });

            if (response.status === 401) {
                console.log('❌ Token expirado o inválido');
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('user');
                sessionStorage.removeItem('role');
                alert('Tu sesión ha expirado. Por favor inicia sesión nuevamente.');
                window.location.href = 'login.html';
                return;
            }
            if (response.status === 403) {
                // permiso denegado, no quitamos el token
                console.log('❌ Acceso denegado - sin permisos');
                alert('No tienes permisos para realizar esta acción.');
                return response; // dejar que el código que llamó maneje el 403
            }

            return response;
        } catch (error) {
            console.error('❌ Error en request:', error);
            throw error;
        }
    }
    async function cargarUsuarios() {
        try {
            const response = await fetchConToken('http://172.18.22.4:3000/department/get-departments', {
                method: 'GET'
            });

            if (!response) {
                console.error('⚠️ No se obtuvo respuesta del servidor');
                return;
            }

            if (!response.ok) {
                console.error('⚠️ Error al cargar usuarios, estado:', response.status);
                // opcional: mostrar mensaje en interfaz
                return;
            }

            const data = await response.json();
            if (!Array.isArray(data)) {
                console.error('⚠️ Formato de datos inesperado:', data);
                return;
            }

            const tabla = document.querySelector('#tabla-body2');
            tabla.innerHTML = '';

            data.forEach(users => {
                const fila = tabla.insertRow();
                fila.insertCell().textContent = users.id;
                fila.insertCell().textContent = users.nombre;
                fila.insertCell().textContent = users.estado;
                const btnEditar = document.createElement('button');
                btnEditar.textContent = 'Editar';
                btnEditar.className = 'btn btn-secondary btn-sm align-items-center btn-edit';
                btnEditar.style = 'float: center;';
                btnEditar.dataset.id = users.id;
                console.log(users);
                // Evitar que usuarios sin rol administrador activen la edición
                function getRoleFromToken() {
                    const token = sessionStorage.getItem('token');
                    if (!token) return null;
                    try {
                        const partes = token.split('.');
                        if (partes.length !== 3) return null;
                        const payload = JSON.parse(atob(partes[1]));
                        return payload?.role || null;
                    } catch (e) {
                        return null;
                    }
                }

                btnEditar.onclick = (dataset) => {
                    const role = getRoleFromToken();
                    if (role !== 'admin') {
                        alert('No tienes permisos para editar este registro');
                        return;
                    }
                    const id = dataset.target.dataset.id;
                    console.log("📌 Guardando id en sessionStorage:", id);
                    sessionStorage.setItem('id', id);
                    window.location.href = `editar_Usuario.html`;
                };
                fila.insertCell().appendChild(btnEditar);
            });

            // actualizar contador total de registros
            const totalEl = document.getElementById('totalRegistros');
            if (totalEl) totalEl.textContent = `Total: ${data.length}`;

            // inicializar/actualizar paginación ahora que la tabla tiene filas
            if (typeof window.initPagination === 'function') {
                window.initPagination();
            }
        } catch (err) {
            console.error('❌ Excepción al cargar usuarios:', err);
        }
    }
    // Captura la información del nombre de la categoria en el formulario
    function activarNombre() {
        const nombre = document.querySelector('#nombre');
        if (nombre.value == "") {
            alert("Por favor, seleccione un nombre");
            return null;
        }
        return nombre.value;
    }

    function activarCategoria() {
        const categoria = document.querySelector('#categoria');
        if (categoria.value == "Seleccione una categoria") {
            alert("Por favor, seleccione una categoria");
            return null;
        }
        return categoria.value;
    }
    //Inserta la información en la tabla del front
    const tabla = document.querySelector('#tabla #tabla-body2');

    // Captura la información del formulario y la agrega a la tabla
    const form = document.querySelector('#formulario');

    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const nombre = activarNombre();
        const categoria = activarCategoria();

        if (!nombre || !categoria) {
            return;
        }

        const datos = {
            nombre,
            categoria
        };
        console.log(datos);
        try {
            const response = await enviarAlBackend(datos);
            if (response && response.password) {
                // ya se mostró alerta en enviarAlBackend
            } else {
                alert('✅ Datos guardados correctamente');
            }
            window.location.href = `../implemento.html`;
        } catch (e) {
            // el error ya fue manejado en enviarAlBackend
        }
    })

    function enviarAlBackend(datos) {
        return fetchConToken('http://172.18.22.4:3000/api/inventario/create_implement', {
            method: 'POST',
            body: JSON.stringify(datos)
        })
            .then(res => {
                if (!res) return null;
                return res.json();
            })
            .then(data => {
                console.log('✔ Enviado al backend:', data);
            })
            .catch(error => {
                console.error('❌ Error al enviar al backend:', error);
                alert('Error al guardar en la base de datos');
                throw error;
            });
    }

    const menu = document.getElementById("menu");
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main")

    menu.addEventListener('click', () => {
        sidebar.classList.toggle('menu-toggle');
        menu.classList.toggle('menu-toggle');
        main.classList.toggle('menu-toggle');
    })
    // ✅ CERRAR SESIÓN
    function cerrarSesion() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

</script>
