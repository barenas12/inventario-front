<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Responsable</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src='sessionControl.js'></script>
    <link rel="icon" href="img/img_rem.png" type="image/x-icon">
    <script src='index2.js' defer></script>
</head>

<body>
    <header>
        <div class="left">
            <div class="menu-container">
                <div class="menu" id="menu">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
            <div class="brand">
                <img src="img/img_rem.png" alt="logo Recovery" class="logo">
                <span class="name">Arcsas</span>
            </div>
        </div>
        <div>
            <span class="name1">INVENTARIO</span>
        </div>
        <nav>
            <!--<a href="">
                <img src="img/img_reco.png" alt="logo Arcsas" class="nav-img">
            </a>-->
            <a id="exportar" class="btn btn-success" style="float: right" position="right">Exportar</a>
        </nav>
    </header>
    <div class="sidebar" id="sidebar">
        <nav>
            <ul>
                <a href="dashboard.html" data-admin>
                    <img src="icons/dashboard.svg" alt="settings">
                    <span>Reportes</span>
                </a>
                <a href="index.html">
                    <img src="icons/library.svg" alt="library">
                    <span>Inventario</span>
                </a>
                <a href="usuario.html" class="selected" data-admin>
                    <img src="icons/user.svg" alt="profile">
                    <span>Usuarios</span>
                </a>
                <a href="departamento.html" data-admin>
                    <img src="icons/departament.svg" alt="settings">
                    <span>Agregar Departamento</span>
                </a>
                <a href="implemento.html" data-admin>
                    <img src="icons/implement.svg" alt="settings">
                    <span>Agregar Implemento</span>
                </a>
                <a href="persona.html">
                    <img src="icons/profile-add.svg" alt="add_implement">
                    <span>Agregar Responsable</span>
                </a>
            </ul>
            <a id="btnCerrarSesion" onclick="cerrarSesion()" style="cursor:pointer;">
                <img src="icons/logout.svg" alt="logout">
                <span>Cerrar Sesión</span>
            </a>
        </nav>
    </div>
    <main id="main">
        <section>
            <div class="row g-2 align-items-center mb-3 justify-content-end">
                <div class="col-auto">
                    <label for="columnaFiltro" class="form-label fw-bold">Filtrar por:</label>
                    <select id="columnaFiltro" class="form-select">
                        <option value="1">Nombre</option>
                        <option value="2">Apellido</option>
                        <option value="3">Usuario</option>
                        <option value="4">Rol</option>
                        <option value="5">Estado</option>
                    </select>
                </div>

                <div class="col-auto">
                    <label for="valorFiltro" class="form-label fw-bold">Valor:</label>
                    <input type="text" id="valorFiltro" class="form-control" placeholder="Ingrese valor">
                </div>

                <div class="col-auto">
                    <label class="form-label fw-bold d-block">&nbsp;</label>
                    <button id="btnFiltrar" class="btn btn-primary" onclick="aplicarFiltro()">Aplicar</button>
                    <button class="btn btn-danger" onclick="limpiarFiltro()">Limpiar Filtro</button>
                    <button id="crear_Usuario" class="btn btn-success"
                        onclick="window.location.href='crear_Usuario.html'">Crear Usuario
                    </button>
                </div>
            </div>
        </section>
        <section>
            <table class="table table-striped-columns" id="tabla">
                <thead>
                    <tr>
                        <th>Id Usuario</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Resetear Contraseña</th>
                        <th>Opciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body"></tbody>
                </tbody>
            </table>
            <div class="d-flex justify-content-between mb-2">
                <div>
                    <span id="totalRegistros" class="fw-bold"></span>
                </div>
                <div>
                    <label for="registrosPorPagina" class="form-label">Mostrar:</label>
                    <select id="registrosPorPagina" class="form-select d-inline-block w-auto">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="12">12</option>
                        <option value="20">20</option>
                        <option value="0">Todos</option>
                    </select>
                    <span> Registros por página</span>
                </div>
            </div>
            <nav>
                <ul class="pagination" id="paginacion"></ul>
            </nav>
        </section>
    </main>
</body>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap');

    * {
        font-family: "Nunito Sans", sans-serif;
        font-size: 1;
    }

    body {
        background-color: #F2F2F2;
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 4px;
    }

    header {
        width: 100%;
        z-index: 200;
        display: flex;
        justify-content: space-between;
        padding: 0.45rem
            /*Superior*/
            2rem
            /*Derecha*/
            0.45rem
            /*Abajo*/
            1.27rem
            /*Izquierda*/
        ;
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        background-color: var(--background-color);
        top: 0;
        left: 0;


    }

    main {
        margin-left: 2.6rem;
        margin-right: -1.5rem;
        padding: 0.8rem;
        padding-top: 70px;
        transition: margin-left 0.5s ease, margin-right 0.3s ease;
    }

    footer {
        margin-left: 2.9rem;
        margin-right: -1.2rem;
        padding: 1rem;
        padding-top: 70px;
        transition: margin-left 0.5s ease, margin-right 0.3s ease;
    }

    /*Nav*/
    .nav-img {
        width: 11%;
    }

    nav a {
        margin-top: 2px;
        margin-right: 3px;
        text-decoration: none;
    }

    nav a:hover {}

    section {
        padding: 0
            /*Superior*/
            2
            /*Derecha*/
            0
            /*Abajo*/
            10rem
            /*Izquierda*/
        ;

    }

    /*Variable global*/
    :root {
        --background-color: white;
        --text-title-color: #053D4E;
        --text-color: #32363B;
        --icon-color: #32363B;
        --icon-menu-color: #707780;
        --menu-color: #707780;

        --text-selected-color: #355CC0;
        --background-selected: #EBF0FF;
        --background-hover: #F7F9FA;

        --border-color: #E6E9ED;

    }

    .left {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
    }

    .brand .logo {
        width: 3.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
    }

    .brand .name {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text-title-color)
    }

    .name1 {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text-title-color);
        display: flex;
        align-items: center;
        text-align: center;
        justify-content: center;
        gap: 0.6rem;
    }

    .menu-container {
        height: 100%;
        display: flex;
        align-items: center;
        cursor: pointer;
    }

    .menu {
        width: 1.5rem;
        height: 37%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /*Menú left*/

    .menu div {
        width: 100%;
        height: 0.15rem;
        background-color: var(--menu-color);
        transition: all 0.2s ease;
    }

    .menu.menu-toggle div:first-child {
        width: 40%;
        transform: rotate(-35deg) translate(-30%, 175%)
    }

    .menu.menu-toggle div:last-child {
        width: 40%;
        transform: rotate(35deg) translate(-30%, -160%)
    }

    /*Form del formulario*/

    .form-select,
    .form-control {
        max-width: 250px;
        border-radius: 0.375rem;
        /* bordes suaves */
        box-shadow: none !important;
        /* sin sombras azules al enfocar */
    }

    .form-label {
        margin-right: 5px;
        font-size: 0.9rem;
    }

    button.btn {
        min-width: 100px;
    }

    .titulo {
        font-family: 'Arial', sans-serif;
        font-size: 36px;
        color: #2c3e50;
        text-align: center;
        margin-top: 40px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    form {
        font-family: 'Arial', sans-serif;
        text-align: center;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ccc;
    }

    /*SideBar*/

    .sidebar {
        margin-top: 4rem;
        width: 4rem;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 100;
        padding: 1.1rem 0;
        border-right: solid var(--border-color);
        overflow-y: auto;
        background-color: var(--background-color);
        transition: 0.5s;
    }

    .sidebar.menu-toggle~main {
        margin-left: 15rem;
        margin-right: -1rem;
    }

    .sidebar.menu-toggle {
        width: 16rem;
        margin-right: 16rem;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 1.3rem;
        padding: 0.9rem 0.7rem;
        text-decoration: none;
        margin: 0 0.5rem;
        border-radius: 0.5rem;
        white-space: nowrap;
        overflow: hidden;
        color: var(--text-color);
    }

    .sidebar a:hover {
        background-color: var(--background-hover);
    }

    .sidebar a.selected {
        color: var(--text-selected-color);
        background-color: var(--background-selected);
    }

    .sidebar img {
        width: 1.6rem;
        flex-shrink: 0;
    }

    .sidebar nav ul {
        list-style: none;
        padding-left: 0;
        margin: 0;
    }


    #tabla td:first-child {
        white-space: nowrap;
    }

    .sidebar-logout {
        position: fixed;
        bottom: 1rem;
        left: 0;
        width: inherit;
        /* hereda el ancho del sidebar */
        padding: 0 0.5rem;
    }

    .sidebar-logout a {
        display: flex;
        align-items: center;
        gap: 1.3rem;
        padding: 0.9rem 0.7rem;
        text-decoration: none;
        border-radius: 0.5rem;
        white-space: nowrap;
        overflow: hidden;
        color: #dc3545;
        /* rojo para distinguirlo */
        transition: background-color 0.2s;
    }

    .sidebar-logout a:hover {
        background-color: #fff0f0;
    }

    .sidebar-logout img {
        width: 1.6rem;
        flex-shrink: 0;
        /* Si tu ícono es oscuro y quieres que se vea rojo: */
        filter: invert(27%) sepia(90%) saturate(700%) hue-rotate(330deg);
    }

    /*Responsive*/

    @media (max-width:500px) {
        .sidebar {
            width: 0;
        }

        .menu.menu-toggle div:first-child {
            width: 40%;
            transform: rotate(-35deg) translate(-30%, 175%)
        }

        .menu.menu-toggle div:last-child {
            width: 40%;
            transform: rotate(35deg) translate(-30%, -160%)
        }

        main {
            margin-left: 0;
        }

        main.menu-toggle {
            margin-left: 0;
        }
    }
</style>

</html>
