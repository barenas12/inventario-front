<script>
    // ✅ FUNCIÓN PARA HACER REQUESTS CON JWT
    async function fetchConToken(url, opciones = {}) {
        const token = sessionStorage.getItem('token');

        if (!token) {
            console.log('❌ No hay token, redirigiendo a login');
            window.location.href = 'login.html';
            return;
        }

        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...opciones.headers
        };

        try {
            const response = await fetch(url, {
                ...opciones,
                headers
            });

            if (response.status === 401) {
                console.log('❌ Token expirado o inválido');
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('user');
                sessionStorage.removeItem('role');
                alert('Tu sesión ha expirado. Por favor inicia sesión nuevamente.');
                window.location.href = 'login.html';
                return;
            }
            if (response.status === 403) {
                // permiso denegado, no quitamos el token
                console.log('❌ Acceso denegado - sin permisos');
                alert('No tienes permisos para realizar esta acción.');
                return response; // dejar que el código que llamó maneje el 403
            }

            return response;
        } catch (error) {
            console.error('❌ Error en request:', error);
            throw error;
        }
    }

    (async () => {
        const id = document.querySelector('#id');
        const nombre = document.querySelector('#nombre');
        const apellido = document.querySelector('#apellido');
        const usuario = document.querySelector('#usuario');
        const rol = document.querySelector('#rol');
        const estado = document.querySelector('#estado');
        const reset_pass = document.querySelector('#reset_pass');

        traerInformacion().then(async (users) => {
            console.log(users);

            // Verifica si el objeto informacion está vacío
            if (Object.keys(users).length === 0) {
                console.error("Error: La información del usuario está vacía.");
                alert("Error al cargar la información del usuario. Por favor, inténtelo de nuevo.");
                return; // Sale de la función si la información está vacía
            }

            id.value = users.id;
            nombre.value = users.nombre;
            apellido.value = users.apellido;
            usuario.value = users.user;
            rol.value = users.role;
            estado.value = users.status;
            reset_pass.value = users.reset_pass;
            console.log("Información de departamentos cargada correctamente.");
        }).catch(error => {
            console.error("Error al cargar la información de departamentos:", error);
        });

    })();
    // Captura la información del ID en el formulario
    function activarId() {

            return null;
        }

    }
    // Captura la información del nombre de la categoria en el formulario
    function activarNombre() {

            return null;
        }
        return nombre.value;
    }
    // Captura la información del apellido en el formulario
    function activarApellido() {
        const apellido = document.querySelector('#apellido');

            return null;
        }

    }
    // Captura la información del usuario en el formulario
    function activarUsuario() {

            return null;
        }
        return usuario.value;
    }
    // Captura la información del rol en el formulario
    function activarRol() {
        const rol = document.querySelector('#rol');
        if (rol.value == "") {
            alert("Por favor, seleccione el rol del usuario");
            return null;
        }
        return rol.value;
    }

    function activarEstado() {
        const estado = document.querySelector('#estado');
        if (estado.value == "") {
            alert("Por favor, seleccione una estado");
            return null;
        }
        console.log(estado.value);
        return estado.value;
    }

    function activarResetPass() {
        const reset_pass = document.querySelector('#reset_pass');
        if (reset_pass.value == "") {
            alert("Por favor, seleccione una opción para resetear la contraseña");
            return null;
        }
        console.log(reset_pass.value);
        return reset_pass.value;
    }
    //Inserta la información en la tabla del front
    const tabla = document.querySelector('#tabla #tabla-body');

    // Captura la información del formulario y la agrega a la tabla
    const form = document.querySelector('#formulario');

    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const nombre = activarNombre();
        const apellido = activarApellido();
        const usuario = activarUsuario();
        const rol = activarRol();
        const estado = activarEstado();
        const reset_pass = activarResetPass();

        // si el usuario que está en sesión no es administrador, no intentamos llamar al PUT
        let myRole = sessionStorage.getItem('role');
        // cuando no haya kilometraje en sessionStorage lo sacamos del token
        if (!myRole) {
            const token = sessionStorage.getItem('token');
            if (token) {
                try {
                    const partes = token.split('.');
                    const payload = JSON.parse(atob(partes[1]));
                    myRole = payload?.role;
                } catch (e) {
                    console.error('Error al decodificar rol del token', e);
                }
            }
        }
        // el backend normaliza el rol a 'admin' o 'user'
        if (myRole !== 'admin') {
            alert('Solo un administrador puede actualizar usuarios.');
            return;
        }

        if (!nombre || !apellido || !usuario || !rol || !estado || !reset_pass) {
            return;
        }

        const datos = {
            nombre,
            apellido,
            usuario,
            rol,
            estado,
            reset_pass
        };
        console.log(datos);
        const result = await actualizarUsuario(datos);
        if (result) {
            window.location.href = `usuario.html`;
        }
    })

    function traerInformacion() {
        return new Promise((resolve, reject) => {
            const id = sessionStorage.getItem('id');
            const url = 'http://172.18.22.4:3000/api/login/users/' + id;
            fetchConToken(url, {
                method: 'GET',
            })
                .then(res => {
                    if (!res.ok) {
                        // Si el estado no es OK, rechaza la promesa con un error
                        return reject(new Error(`HTTP error! Status: ${res.status}`));
                    }
                    // Verifica si la respuesta está vacía
                    if (res.status === 204) {
                        return reject(new Error("No Content: La respuesta está vacía"));
                    }
                    return res.json();
                })
                .then(implemento => {
                    resolve(implemento);
                })
                .catch(function (error) {
                    console.error("¡Error!", error);
                    reject(error);
                });
        })
    }

    function actualizarUsuario(datos) {
        const id = sessionStorage.getItem('id');
        return fetchConToken(`http://172.18.22.4:3000/api/login/users/` + id, {
            method: 'PUT',
            body: JSON.stringify(datos)
        })
            .then(res => {
                if (!res) return null; // ya se manejó token/403 en fetchConToken
                if (res.status === 403) {
                    alert('No tienes permisos para actualizar este usuario.');
                    return null;
                }
                return res.json();
            })
            .then(data => {
                if (!data) return null;
                console.log('✔ Actualizado Correctamente:', data);
                let msg = data.mensaje;
                if (data.password) {
                    msg += '\nNueva contraseña: ' + data.password;
                }
                alert(msg);
                return data;
            })
            .catch(error => {
                console.error('❌ Error al enviar al backend:', error);
                alert('Error al guardar en la base de datos');
                return null;
            });
    }

    const menu = document.getElementById("menu");
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main")

    menu.addEventListener('click', () => {
        sidebar.classList.toggle('menu-toggle');
        menu.classList.toggle('menu-toggle');
        main.classList.toggle('menu-toggle');
    })
    // ✅ CERRAR SESIÓN
    function cerrarSesion() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

</script>
