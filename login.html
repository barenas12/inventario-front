<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src='main.js'></script>
  <title>Login</title>
</head>

<body>

  <!-- Fondo independiente con opacidad -->
  <div class="fondo"></div>

  <form>

    <h3 class="titulo">Login</h3>

    <div class="mb-3 text-start">
      <label class="form-label">Usuario</label>
      <div>
        <input onchange="tomar_usuario()" class="form-control" name="user" placeholder="Ingrese su Usuario" id="user">
      </div>
    </div>

    <div class="mb-3 text-start">
      <label for="password" class="form-label">Contraseña</label>
      <div>
        <input type="password" onchange="tomar_password()" class="form-control" name="password"
          placeholder="Ingrese su Contraseña" id="password">
      </div>

    </div>

    <button type="submit" onclick="comprobar_credenciales()" class="btn btn-primary w-100">Ingresar</button>

  </form>

</body>

</html>
