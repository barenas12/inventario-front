<!-- login.html -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="icon" href="img/img_rem.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="main1.js" defer></script>
</head>

<body>
  <div class="fondo"></div>
  <form id="loginForm">
    <h3 class="titulo">Login</h3>
    <div class="mb-3 text-start">
      <label class="form-label">Usuario</label>
      <input class="form-control" id="username" placeholder="Ingrese su Usuario">
    </div>
    <div class="mb-3 text-start">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="password" placeholder="Ingrese su Contraseña">
    </div>
    <button type="submit" class="btn btn-primary w-100" id="loginBtn">Ingresar</button>
  </form>
  <pre id="status"></pre>
</body>

</html>
